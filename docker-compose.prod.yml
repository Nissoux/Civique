services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: civique
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-civique_prod_secret}
      POSTGRES_DB: civique
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civique"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://civique:${POSTGRES_PASSWORD:-civique_prod_secret}@postgres:5432/civique
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
    ports:
      - "127.0.0.1:3002:3000"

volumes:
  pgdata:

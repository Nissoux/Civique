version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: civique-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: civique
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: civique2026
    volumes:
      - civique_pgdata:/var/lib/postgresql/data

volumes:
  civique_pgdata:

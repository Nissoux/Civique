<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#002395"/>
      <stop offset="100%" stop-color="#001A6E"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Marianne silhouette - modernized flat design -->
  <!-- Phrygian cap -->
  <path d="M512 180 C480 180 420 220 400 300 C380 370 390 380 410 390 L420 350 C430 300 460 260 512 240 C564 260 594 300 604 350 L614 390 C634 380 644 370 624 300 C604 220 544 180 512 180Z" fill="white" opacity="0.95"/>

  <!-- Cockade (rosette on cap) -->
  <circle cx="512" cy="230" r="22" fill="#ED2939"/>
  <circle cx="512" cy="230" r="14" fill="white"/>
  <circle cx="512" cy="230" r="7" fill="#002395"/>

  <!-- Face -->
  <ellipse cx="512" cy="420" rx="75" ry="90" fill="white" opacity="0.95"/>

  <!-- Neck -->
  <path d="M480 500 L480 560 L544 560 L544 500" fill="white" opacity="0.95"/>

  <!-- Shoulders / Draped fabric -->
  <path d="M340 700 C360 620 420 570 480 560 L544 560 C604 570 664 620 684 700 L684 720 L340 720Z" fill="white" opacity="0.9"/>

  <!-- Tricolor sash across chest -->
  <path d="M420 590 L380 700 L400 700 L440 600Z" fill="#002395" opacity="0.8"/>
  <path d="M440 600 L400 700 L420 700 L460 600Z" fill="white" opacity="0.8"/>
  <path d="M460 600 L420 700 L440 700 L480 600Z" fill="#ED2939" opacity="0.8"/>

  <!-- Text: CIVIQUE -->
  <text x="512" y="830" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="110" fill="white" letter-spacing="12">CIVIQUE</text>

  <!-- Subtle stars decoration -->
  <circle cx="260" cy="830" r="4" fill="white" opacity="0.4"/>
  <circle cx="764" cy="830" r="4" fill="white" opacity="0.4"/>
  <circle cx="280" cy="810" r="3" fill="white" opacity="0.3"/>
  <circle cx="744" cy="810" r="3" fill="white" opacity="0.3"/>
</svg>
